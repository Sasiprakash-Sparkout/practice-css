<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
      .linear{
            background-image: linear-gradient(to right,rgba(1, 3, 18, 0.763),rgba(141, 146, 199, 0.45));
             min-height: 30vh;
        }
        .radical{
            min-height: 40vh;
            background-image: repeating-radial-gradient(circle closest-corner at 70px 100px,red,gray ,blue,black,white);
        }
        .conic{
           width: 400px;
           height: 400px;
           border-radius: 50%;
        background-image: repeating-conic-gradient( red 5%  ,blue 15% ,yellow 20%);
        }
    </style>
</head>
<body>
    <h1>Linear Gradients</h1>
    <div class="linear"></div>
    <h1>radical gradients</h>
        <div class="radical"></div>
        <h1>conic</h1>
        <div class="conic"></div>
</body>
</html>
