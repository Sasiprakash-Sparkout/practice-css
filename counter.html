<head>
    <meta charset="UTF-8">

    <title>Document</title>
    <style>
        body{
            counter-reset: head;
        }
        h1::before{
            counter-increment: head;
            content:"title " counter(head) ". ";
        }
        h2::before{
            counter-increment: subhead;
            content: counter(head)"." counter(head)" ";
        }
    </style>
</head>

    <h2>headings</h2>
