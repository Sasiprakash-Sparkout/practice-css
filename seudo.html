<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
     a{
    display:inline-block;
    text-decoration:none;
    padding:20px 30px;
    border:2px solid blue;
    margin:40px 30px;
    color:black;
    transition:0.3s;
}

a:visited{
    color:purple;
}

a:hover{
    background-color:blue;
    color:white;
}

a:active{
    background-color:red;
    color:gray;
}
li:nth-child(2){
    color: red;
    background-color: yellow;
}

    </style>
</head>
<body>
    <a href="table.html">click me!</a>
     <ul class="a">
        <li>furniture</li>
        <li>bridhe</li>
        <li>washingmachine</li>
        <li>ac</li>
    </ul>
    <ol class="b">
        <li>laptop</li>
        <li>mobiles</li>
        <li>ipads</li>
</body>
</html>
