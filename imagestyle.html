<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .img img{
            width: 200px;
            height: 200px;
            border: 2px solid gray;
            border-radius: 70%;
            margin-left: 20px;
        }
        .thumbil img{
            border: 5px solid gray;
            border-radius: 20px;
            margin-left: 20px;
        
        }
        .thumbil:hover img{
            box-shadow: 5px 3px 4px goldenrod,2px 4px 5px blue;
        }
        .cards{
          
           width:60%;
            background-color:white;
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2), 0 6px 20px 0 rgba(0, 0, 0, 0.19);
        }
        .container{
         
            text-align:left;
            padding: 20px 10px;
        }
    </style>
</head>
<body>
    <h1>IMAGE STYLING in circle</h1>
    <div class="img">
        
        <img src="./img/img1.jpg" alt="word">
        <img src="./img/2.jpg" alt="hello">
    </div>
    <h1>image styling in thumbil images</h1>
    <div class="thumbil">
        <img src="./img/img4.jpg" alt="hello">
        <img src="./img/img3.jpg" alt="world">
    </div>
    <h1>polard images and cards</h1>
    <div class="cards">
        <img src="./img/img3.jpg" alt="image" style="width: 100%;">
        <div class="container">
            <h2>Pramid</h2>
        </div>
        <div class="cards">
            <img src="./img/img2.jpg" alt="image" style="width: 100%;">
            <div class="container">
                <h2>Bridge</h2>
            </div>
        </div>
    </div>
</body>
</html>
